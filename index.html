  }

    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;

  .logo { font-size: 20px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }

  }
  .dl-btn:hover { background: rgba(16,185,129,.25); }
  .dl-btn.xlsx { background: rgba(99,102,241,.15); border-color: rgba(99,102,241,.4); color: #a5b4fc; }
  .dl-btn.xlsx:hover { background: rgba(99,102,241,.25); }
  .tab-bar {

    overflow-x: auto; -webkit-overflow-scrolling: touch;

  .tab-bar::-webkit-scrollbar { display: none; }
  .tabs { display: flex; gap: 6px; padding: 10px 20px; flex-wrap: nowrap; width: max-content; }
  .tab {
    background: rgba(30,41,59,.8); border: 1px solid #334155;
    color: #94a3b8; border-radius: 20px; padding: 5px 16px;
    cursor: pointer; font-size: 12px; font-weight: 500;
    white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .tab.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-color: #6366f1; color: #fff; font-weight: 700;
  }
  .tab .cnt { opacity: .7; font-size: 10px; margin-left: 3px; }
  .table-wrap {
    flex: 1; overflow-y: auto; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding: 0 20px 40px;
  }
  table { width: 100%; border-collapse: separate; border-spacing: 0; }
  thead th {
    background: #0f172a; color: #64748b; font-weight: 700; font-size: 11px;
    padding: 10px 12px; text-align: left; letter-spacing: 0.5px;
    border-bottom: 1px solid #1e293b; cursor: pointer; white-space: nowrap;
    position: sticky; top: 0; z-index: 2; user-select: none;
  }
  thead th:hover { color: #cbd5e1; }
  thead th.num { text-align: right; }
  tbody td {
    padding: 9px 12px; border-bottom: 1px solid #131c2e; white-space: nowrap;
  }
  tbody tr:hover { background: rgba(99,102,241,.06); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
  .up { color: #f87171; }
  .down { color: #4ade80; }
  .flat { color: #94a3b8; }
  .code-link { color: #818cf8; cursor: pointer; text-decoration: none; font-weight: 600; }
  .code-link:hover { text-decoration: underline; }
  .badge {
    display: inline-block; border-radius: 5px; padding: 2px 7px;
    font-size: 10.5px; font-weight: 700; letter-spacing: .3px;
  }
  .badge-p { background: rgba(59,130,246,.18); color: #60a5fa; }
  .badge-s { background: rgba(168,85,247,.18); color: #c084fc; }
  .badge-g { background: rgba(34,197,94,.18); color: #4ade80; }
  .badge-e { background: rgba(148,163,184,.18); color: #94a3b8; }
  .badge-n { background: rgba(245,158,11,.18); color: #fbbf24; }
  .stop-flag {
    display: inline-block; background: rgba(248,113,113,.2); color: #f87171;
    border-radius: 4px; padding: 1px 5px; font-size: 9.5px; font-weight: 800;
    margin-left: 5px; vertical-align: middle;
  }

    border-top: 1px solid #1e293b; background: #0a0e1a;
  }

  "活況銘柄": { volume: "約定回数" }
};

const HIDDEN_COLUMNS = {
  "S高": ["volume"],
  "P高値": ["volume"],

};

function badgeClass(m) {
  if (!m) return "badge-e";
  if (m.includes("Ｐ")) return "badge-p";
  if (m.includes("Ｓ")) return "badge-s";
  if (m.includes("Ｇ")) return "badge-g";
  if (m.includes("Ｅ")) return "badge-e";
  return "badge-n";
}

function fmt(v) {
  if (v === null || v === undefined || v === "－" || v === "") return '<span class="dash">－</span>';
  if (typeof v === "number") return v.toLocaleString("ja-JP");
  return v;
}

function fmtPct(v) {
  if (v === null || v === undefined || v === "" || v === "－") return '<span class="dash">－</span>';
  const n = Number(v);
  const sign = n > 0 ? "+" : "";
  return sign + n.toFixed(2);
}

function pctClass(v) {
  const n = Number(v);
  if (!isFinite(n) || n === 0) return "flat";
  return n > 0 ? "up" : "down";
}

function openKabutan(code) {
  window.open("https://kabutan.jp/stock/?code=" + code, "_blank");
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = ORDER.map(name => {
    const cnt = SHEETS[name].rows.length;
    const cls = name === activeTab ? "tab active" : "tab";
    return `<button class="${cls}" onclick="selectTab('${name}')">${name}<span class="cnt">${cnt}</span></button>`;
  }).join("");
}

function selectTab(name) {
  activeTab = name;
  sortKey = null; sortDir = "asc";
  renderTable();
  renderTabs();
}

function getColsFor(name) {
  const base = COL_DEFS[SHEETS[name].type];
  const overrides = LABEL_OVERRIDES[name] || {};
  const hidden = HIDDEN_COLUMNS[name] || [];
  return base
    .filter(c => !hidden.includes(c.key))
    .map(c => overrides[c.key] ? Object.assign({}, c, {label: overrides[c.key]}) : c);
}

function getCols() {
  return getColsFor(activeTab);
}

function getFiltered() {
  return SHEETS[activeTab].rows;
}

function getSorted(rows) {
  if (!sortKey) return rows;
  const copy = [...rows];
  copy.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    const na = Number(va), nb = Number(vb);
    let cmp;
    if (!isNaN(na) && !isNaN(nb) && va !== null && va !== "－" && vb !== null && vb !== "－") {
      cmp = na - nb;
    } else {
      cmp = String(va ?? "").localeCompare(String(vb ?? ""), "ja");
    }
    return sortDir === "asc" ? cmp : -cmp;
  });
  return copy;
}

function handleSort(key) {
  if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
  else { sortKey = key; sortDir = "asc"; }
  renderTable();
}

function cellHTML(col, row) {
  const v = row[col.key];

      return `<span class="code-link" onclick="openKabutan('${v}')">${v}</span>`;

    case "pct":
      return `<span class="${pctClass(v)}">${fmtPct(v)}</span>`;
    case "num":
      if (col.key === "change") {
        const cls = Number(v) > 0 ? "up" : Number(v) < 0 ? "down" : "flat";
        const sign = Number(v) > 0 ? "+" : "";
        return v === null ? '<span class="dash">－</span>' : `<span class="${cls}">${sign}${fmt(v)}</span>`;
      }
      return fmt(v);
    case "raw":
      return fmt(v);
    default:
      let txt = v === null || v === undefined ? "" : v;
      let stopBadge = "";
      if (col.key === "name" && row.stop) stopBadge = `<span class="stop-flag">${row.stop}</span>`;
      return txt + stopBadge;
  }
}

function renderTable() {
  const cols = getCols();
  const filtered = getFiltered();
  const sorted = getSorted(filtered);

  document.getElementById("thead").innerHTML = cols.map(col => {
    const cls = col.type !== "text" && col.type !== "market" && col.type !== "code" ? ' class="num"' : "";
    const arrow = sortKey === col.key ? (sortDir === "asc" ? " ▲" : " ▼") : " ⇅";
    return `<th${cls} onclick="handleSort('${col.key}')">${col.label}${arrow}</th>`;
  }).join("");

  document.getElementById("tbody").innerHTML = sorted.map(row => {
    return "<tr>" + cols.map(col => {
      const cls = col.type !== "text" && col.type !== "market" && col.type !== "code" ? ' class="num"' : (col.type === "text" ? ' class="name"' : "");
      return `<td${cls}>${cellHTML(col, row)}</td>`;
    }).join("") + "</tr>";
  }).join("");

  document.getElementById("meta-info").textContent = `${sorted.length} 件表示　|　最終更新: 2026-06-25`;
}

function sheetExportData(name) {
  const cols = getColsFor(name);
  const rows = SHEETS[name].rows;
  const header = cols.map(c => c.label);
  const body = rows.map(r => cols.map(c => {
    const v = r[c.key];
    if (c.type === "pct") return v === null || v === undefined ? "" : Math.round(Number(v) * 100) / 100;
    return v === null || v === undefined ? "" : v;
  }));
  return { header, body };
}

function downloadExcel() {
  const wbook = XLSX.utils.book_new();
  ORDER.forEach(name => {
    const { header, body } = sheetExportData(name);
    const ws = XLSX.utils.aoa_to_sheet([header, ...body]);
    XLSX.utils.book_append_sheet(wbook, ws, name.slice(0, 31));
  });
  XLSX.writeFile(wbook, "デイリーランキング_全シート.xlsx");
}

renderTabs();
renderTable();
</script>
