  return v;
}
function fmtPct(v) {
  if (v === null || v === undefined || v === "" || v === "－") return '<span class="dash">－</span>';
  const n = Number(v); const sign = n > 0 ? "+" : "";
  return sign + n.toFixed(2);
}
function pctClass(v) { const n = Number(v); if (!isFinite(n) || n === 0) return "flat"; return n > 0 ? "up" : "down"; }

function getColsFor(name) {
  const base = COL_DEFS[SHEETS[name].type];
  const overrides = LABEL_OVERRIDES[name] || {};
  const hidden = HIDDEN_COLUMNS[name] || [];
  return base.filter(c => !hidden.includes(c.key)).map(c => overrides[c.key] ? Object.assign({}, c, {label: overrides[c.key]}) : c);
}
function getCols() { return getColsFor(activeTab); }
function renderTabs() {

  if (!sortKey) return rows;
  const copy = [...rows];
  copy.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    const na = Number(va), nb = Number(vb);
    let cmp = (!isNaN(na) && !isNaN(nb) && va !== null && va !== "－" && vb !== null && vb !== "－")

    return sortDir === "asc" ? cmp : -cmp;

}
function handleSort(key) { if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc"; else { sortKey = key; sortDir = "asc"; } renderTable(); }
function cellHTML(col, row) {
  const v = row[col.key];
  switch (col.type) {
    case "code": return `<span class="code-link" onclick="openKabutan('${v}')">${v}</span>`;
    case "market": return `<span class="badge ${badgeClass(v)}">${v || ""}</span>`;
    case "pct": return `<span class="${pctClass(v)}">${fmtPct(v)}</span>`;
    case "num":
      if (col.key === "change") {
        const cls = Number(v) > 0 ? "up" : Number(v) < 0 ? "down" : "flat";
